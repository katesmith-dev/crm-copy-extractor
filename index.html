<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Copy Extractor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --border: #E0DDD6;
    --border-strong: #C8C4BB;
    --text: #1A1916;
    --text-muted: #6B6760;
    --text-faint: #9B9790;
    --accent: #2D5BE3;
    --accent-light: #EEF2FD;
    --accent-border: #B8CAFE;
    --success: #1A7A4A;
    --success-bg: #EDFAF3;
    --danger: #C0392B;
    --danger-bg: #FEF0EE;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .wrapper {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  header p {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
  }

  .card-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    min-height: 180px;
    resize: vertical;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-faint); }

  .hint { font-size: 12px; color: var(--text-faint); margin-top: 8px; }

  .pills { display: flex; flex-wrap: wrap; gap: 6px; }

  .pill {
    padding: 6px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 99px;
    font-size: 13px;
    font-family: var(--sans);
    cursor: pointer;
    background: var(--surface);
    color: var(--text-muted);
    transition: all 0.12s;
    user-select: none;
  }

  .pill:hover { border-color: var(--accent); color: var(--accent); }

  .pill.on {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent-border);
    font-weight: 500;
  }

  .run-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 4px;
  }

  .run-btn:hover:not(:disabled) { opacity: 0.9; }
  .run-btn:active:not(:disabled) { transform: scale(0.99); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-box {
    background: var(--danger-bg);
    border: 1px solid #F5C6C2;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 12px;
  }

  .loading-box {
    text-align: center;
    padding: 32px 0;
    font-size: 14px;
    color: var(--text-muted);
  }

  .dot-anim::after {
    content: '';
    animation: dots 1.2s steps(3, end) infinite;
  }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }

  .results { margin-top: 20px; }

  .date-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .date-header {
    padding: 10px 18px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .date-header span {
    color: var(--text);
    font-size: 13px;
  }

  .tp-block {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }

  .tp-block:last-child { border-bottom: none; }

  .tp-name {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .comp {
    margin-bottom: 12px;
  }

  .comp:last-child { margin-bottom: 0; }

  .comp-label {
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 4px;
    font-family: var(--mono);
  }

  .comp-text {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    white-space: pre-wrap;
    font-family: var(--mono);
  }

  .copy-btn {
    font-size: 11px;
    padding: 3px 10px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text-muted);
    font-family: var(--sans);
    margin-top: 5px;
    transition: all 0.12s;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { background: var(--success-bg); color: var(--success); border-color: #A3D9BE; }

  .notes-box {
    font-size: 12px;
    color: var(--text-faint);
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    font-style: italic;
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>CRM Copy Extractor</h1>
    <p>Paste your CRF, pick your channels, get only what you need.</p>
  </header>

  <div class="card">
    <p class="card-label">CRF Copy Tab Content</p>
    <textarea id="crf-input" placeholder="Paste the full Copy tab here — all channels, all dates, all touchpoints."></textarea>
    <p class="hint">Paste everything. The tool will filter it down.</p>
  </div>

  <div class="card">
    <p class="card-label">Channel(s) needed</p>
    <div class="pills" id="pill-area">
      <div class="pill" data-ch="Email">Email</div>
      <div class="pill" data-ch="SMS">SMS</div>
      <div class="pill" data-ch="Push notification">Push notification</div>
      <div class="pill" data-ch="In-app message">In-app message</div>
      <div class="pill" data-ch="Direct mail">Direct mail</div>
      <div class="pill" data-ch="Paid / display ad">Paid / display ad</div>
    </div>
    <p class="hint" style="margin-top:10px;">Select one or more channels.</p>
  </div>

  <div id="err-area"></div>

  <button class="run-btn" id="run-btn" onclick="runExtraction()">Extract CRM copy</button>

  <div id="output-area" class="results"></div>
</div>

<script>
  const selected = new Set();

  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', function() {
      const ch = this.getAttribute('data-ch');
      if (selected.has(ch)) { selected.delete(ch); this.classList.remove('on'); }
      else { selected.add(ch); this.classList.add('on'); }
    });
  });

  function showError(msg) {
    document.getElementById('err-area').innerHTML = `<div class="error-box">${msg}</div>`;
  }
  function clearError() { document.getElementById('err-area').innerHTML = ''; }

  async function runExtraction() {
    const crf = document.getElementById('crf-input').value.trim();
    const channels = Array.from(selected);
    const btn = document.getElementById('run-btn');
    const out = document.getElementById('output-area');
    clearError();

    if (!crf) { showError('Please paste your CRF copy first.'); return; }
    if (channels.length === 0) { showError('Please select at least one channel.'); return; }

    btn.disabled = true;
    btn.textContent = 'Extracting...';
    out.innerHTML = '<div class="loading-box"><span class="dot-anim">Reading your CRF and pulling the right copy</span></div>';

    const system = `You are a CRM operations assistant. Extract only the copy relevant to specific CRM channels from a Creative Request Form (CRF) document.

The CRF Copy tab contains copy for many channels, organized by date and campaign touchpoints (e.g. "Send 1", "Reminder", "Day 3").

Your job:
1. Detect all send dates or date references in the document
2. Under each date, detect all touchpoints (e.g. "Email Send 1", "SMS Reminder")
3. For each touchpoint, extract ONLY the copy for these channels: ${channels.join(', ')}
4. Organize copy by component (Subject line, Preview text, Header, Body copy, CTA, etc.)
5. Skip copy that belongs to other channels not listed above

Respond ONLY with valid JSON. No markdown, no backticks, no explanation.

JSON format:
{
  "dates": [
    {
      "date": "Date label as it appears in the doc",
      "touchpoints": [
        {
          "name": "Touchpoint name",
          "channel": "Channel name",
          "components": [
            { "label": "Component name", "copy": "The copy text" }
          ]
        }
      ]
    }
  ],
  "notes": "Any notes on ambiguities or missing content. Empty string if none."
}

If no dates found, use date: "No date specified". Omit touchpoints with no relevant channel copy.`;

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "anthropic-dangerous-direct-browser-calls": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          system: system,
          messages: [{ role: "user", content: `Extract CRM copy for: ${channels.join(', ')}\n\nCRF content:\n\n${crf}` }]
        })
      });

      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({}));
        showError(`API error ${resp.status}: ${errData.error?.message || resp.statusText}`);
        out.innerHTML = ''; return;
      }

      const data = await resp.json();
      if (data.error) { showError(`API error: ${data.error.message}`); out.innerHTML = ''; return; }

      const raw = (data.content || []).map(i => i.text || '').join('');
      if (!raw) { showError('No response received. Please try again.'); out.innerHTML = ''; return; }

      const clean = raw.replace(/```json|```/g, '').trim();

      let parsed;
      try { parsed = JSON.parse(clean); }
      catch(e) { showError(`Could not parse the response — try pasting a smaller section. Detail: ${e.message}`); out.innerHTML = ''; return; }

      render(parsed);
    } catch(e) {
      showError(`Error: ${e.message}`);
      out.innerHTML = '';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Extract CRM copy';
    }
  }

  function render(parsed) {
    const out = document.getElementById('output-area');
    if (!parsed.dates || parsed.dates.length === 0) {
      out.innerHTML = '<p style="font-size:13px;color:var(--text-muted);padding:16px 0;">No matching copy found for the selected channels.</p>';
      return;
    }

    let html = '';
    parsed.dates.forEach(d => {
      html += `<div class="date-block"><div class="date-header">Send date &rarr; <span>${esc(d.date)}</span></div>`;
      if (!d.touchpoints || d.touchpoints.length === 0) {
        html += `<div class="tp-block"><p style="font-size:13px;color:var(--text-faint);font-style:italic;">No matching copy found for this date.</p></div>`;
      } else {
        d.touchpoints.forEach(tp => {
          html += `<div class="tp-block"><p class="tp-name">${esc(tp.channel)} &mdash; ${esc(tp.name)}</p>`;
          (tp.components || []).forEach(comp => {
            const id = 'c' + Math.random().toString(36).slice(2);
            html += `<div class="comp">
              <p class="comp-label">${esc(comp.label)}</p>
              <p class="comp-text" id="${id}">${esc(comp.copy)}</p>
              <button class="copy-btn" onclick="cp('${id}',this)">Copy</button>
            </div>`;
          });
          html += `</div>`;
        });
      }
      html += `</div>`;
    });

    if (parsed.notes) {
      html += `<p class="notes-box">${esc(parsed.notes)}</p>`;
    }

    out.innerHTML = html;
  }

  function cp(id, btn) {
    const el = document.getElementById(id);
    navigator.clipboard.writeText(el.innerText).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    });
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
